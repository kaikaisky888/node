worker_processes auto;
pid /run/nginx.pid;
error_log /app/work/logs/bypass/nginx-error.log warn;

# Load modules (Lua, NDK, etc.)
include /etc/nginx/modules-enabled/*.conf;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /app/work/logs/bypass/nginx-access.log main;

    sendfile        on;
    tcp_nopush      on;
    keepalive_timeout 65;

    # Lua package path
    lua_package_path "/workspace/projects/nginx/lua/?.lua;/usr/share/lua/5.1/?.lua;;";
    lua_shared_dict auth_cache 10m;

    # ─── Upstream: PHP Auth Service ────────────────────────────
    upstream php_auth {
        server 127.0.0.1:8090;
    }

    # ─── Main Server (port 5000) ───────────────────────────────
    server {
        listen 5000;
        server_name _;

        root /workspace/projects/frontend;

        # Security headers
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # ─── API: Auth Service Proxy ───────────────────────────
        location /api/auth/ {
            proxy_pass http://php_auth;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ─── API: Admin API Proxy ──────────────────────────────
        location /api/admin/ {
            proxy_pass http://php_auth;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ─── Error Pages ──────────────────────────────────────
        error_page 403 /errors/403.html;
        error_page 429 /errors/429.html;

        location = /errors/403.html {
            alias /workspace/projects/frontend/errors/403.html;
            internal;
        }
        location = /errors/429.html {
            alias /workspace/projects/frontend/errors/429.html;
            internal;
        }

        # ─── C站: 授权入口 (唯一可发起授权的地方) ──────────────
        location /c/ {
            access_by_lua_file /workspace/projects/nginx/lua/site_c.lua;

            alias /workspace/projects/frontend/site-c/;
            index index.html;
            try_files $uri $uri/ /c/index.html;
        }

        # ─── C站 API: 设备指纹JS ───────────────────────────────
        location /c/fingerprint.js {
            alias /workspace/projects/frontend/site-c/fingerprint.js;
            default_type application/javascript;
            add_header Cache-Control "no-cache";
        }

        # ─── B站: 鉴权中转层 (Lua全量拦截) ────────────────────
        location /b/ {
            access_by_lua_file /workspace/projects/nginx/lua/site_b.lua;

            # Proxy auth requests to PHP
            location ~ ^/b/api/auth/(.*) {
                proxy_pass http://php_auth/api/auth/$1;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            }

            # Static files
            alias /workspace/projects/frontend/site-b/;
            index index.html;
            try_files $uri $uri/ /b/index.html;
        }

        # ─── A站: 核心业务站 (裸访拦截) ───────────────────────
        location /a/ {
            access_by_lua_file /workspace/projects/nginx/lua/site_a.lua;

            alias /workspace/projects/frontend/site-a/;
            index index.html;
            try_files $uri $uri/ /a/index.html;
        }

        # ─── Admin: 管理后台 ───────────────────────────────────
        location /admin/ {
            alias /workspace/projects/frontend/admin/;
            index index.html;
            try_files $uri $uri/ /admin/index.html;
        }

        # ─── Root: redirect to C站 ─────────────────────────────
        location = / {
            return 302 /c/;
        }

        # ─── Health check ──────────────────────────────────────
        location /health {
            content_by_lua_block {
                local cjson = require "cjson.safe"
                ngx.say(cjson.encode({
                    success = true,
                    data = {
                        status = "ok",
                        gateway = "nginx+lua",
                        time = ngx.now()
                    }
                }))
            }
        }
    }
}
