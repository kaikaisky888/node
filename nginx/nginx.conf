worker_processes auto;
pid /run/nginx.pid;
error_log /app/work/logs/bypass/nginx-error.log warn;

# Load modules (Lua, NDK, etc.)
include /etc/nginx/modules-enabled/*.conf;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /app/work/logs/bypass/nginx-access.log main;

    sendfile        on;
    tcp_nopush      on;
    keepalive_timeout 65;

    # Lua package path
    lua_package_path "/workspace/projects/nginx/lua/?.lua;/usr/share/lua/5.1/?.lua;;";
    lua_shared_dict auth_cache 10m;

    # ─── Upstream: PHP Auth Service ────────────────────────────
    upstream php_auth {
        server 127.0.0.1:8090;
    }

    # ─── Shared CORS: allow a/b/c.okok.cfd ─────────────────────
    map $http_origin $cors_origin {
        "~^https://[abc]\.okok\.cfd$" $http_origin;
        default "";
    }

    # ═══════════════════════════════════════════════════════════
    # C站: c.okok.cfd — 授权入口
    # ═══════════════════════════════════════════════════════════
    server {
        listen 5000;
        server_name c.okok.cfd;

        root /workspace/projects/frontend/site-c;

        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        access_by_lua_file /workspace/projects/nginx/lua/site_c.lua;

        location = /fingerprint.js {
            alias /workspace/projects/frontend/site-c/fingerprint.js;
            default_type application/javascript;
            add_header Cache-Control "no-cache";
        }

        location / {
            try_files $uri $uri/ /index.html;
        }

        error_page 403 /errors/403.html;
        error_page 429 /errors/429.html;
        location = /errors/403.html {
            alias /workspace/projects/frontend/errors/403.html;
            internal;
        }
        location = /errors/429.html {
            alias /workspace/projects/frontend/errors/429.html;
            internal;
        }
    }

    # ═══════════════════════════════════════════════════════════
    # B站: b.okok.cfd — 鉴权中转 + API
    # ═══════════════════════════════════════════════════════════
    server {
        listen 5000;
        server_name b.okok.cfd;

        root /workspace/projects/frontend/site-b;

        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        access_by_lua_file /workspace/projects/nginx/lua/site_b.lua;

        # ─── API: Auth (with CORS for C站/A站) ────────────────
        location /api/auth/ {
            add_header 'Access-Control-Allow-Origin' $cors_origin always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization, X-Device-Fingerprint' always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;

            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' $cors_origin;
                add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS';
                add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization, X-Device-Fingerprint';
                add_header 'Access-Control-Allow-Credentials' 'true';
                add_header 'Access-Control-Max-Age' 86400;
                return 204;
            }

            proxy_pass http://php_auth;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/admin/ {
            proxy_pass http://php_auth;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location / {
            try_files $uri $uri/ /index.html;
        }

        error_page 403 /errors/403.html;
        error_page 429 /errors/429.html;
        location = /errors/403.html {
            alias /workspace/projects/frontend/errors/403.html;
            internal;
        }
        location = /errors/429.html {
            alias /workspace/projects/frontend/errors/429.html;
            internal;
        }
    }

    # ═══════════════════════════════════════════════════════════
    # A站: a.okok.cfd — 核心业务站 (裸访拦截)
    # ═══════════════════════════════════════════════════════════
    server {
        listen 5000;
        server_name a.okok.cfd;

        root /workspace/projects/frontend/site-a;

        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        access_by_lua_file /workspace/projects/nginx/lua/site_a.lua;

        location / {
            try_files $uri $uri/ /index.html;
        }

        error_page 403 /errors/403.html;
        location = /errors/403.html {
            alias /workspace/projects/frontend/errors/403.html;
            internal;
        }
    }


    # ═══════════════════════════════════════════════════════════
    # Admin: admin.okok.cfd — 管理后台
    # ═══════════════════════════════════════════════════════════
    server {
        listen 5000;
        server_name admin.okok.cfd;

        root /workspace/projects/frontend/admin;

        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # Admin API 代理
        location /api/admin/ {
            proxy_pass http://php_auth;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location / {
            try_files $uri $uri/ /index.html;
        }
    }

    # ═══════════════════════════════════════════════════════════
    # Fallback
    # ═══════════════════════════════════════════════════════════
    server {
        listen 5000 default_server;
        server_name _;

        root /workspace/projects/frontend;

        location /health {
            content_by_lua_block {
                local cjson = require "cjson.safe"
                ngx.say(cjson.encode({
                    success = true,
                    data = {
                        status = "ok",
                        gateway = "nginx+lua",
                        time = ngx.now()
                    }
                }))
            }
        }

        location = / {
            return 302 https://c.okok.cfd/;
        }
    }
}
